<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>André & Thiago — Realidade Aumentada</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a1a14; font-family: 'Georgia', serif; overflow: hidden; height: 100dvh; width: 100vw; }

    #loading-screen {
      position: fixed; inset: 0; background: #0a1a14;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; z-index: 9999; transition: opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .logo-wrapper {
      width: 140px; height: 140px; border-radius: 50%; overflow: hidden;
      border: 3px solid #c8832a; box-shadow: 0 0 40px rgba(200,131,42,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(200,131,42,0.4); }
      50% { box-shadow: 0 0 70px rgba(200,131,42,0.75); }
    }

    .loading-title { color: #e8c87a; font-size: 22px; letter-spacing: 4px; text-transform: uppercase; }
    .loading-sub { color: #8aaa96; font-size: 13px; letter-spacing: 1.5px; text-align: center; line-height: 1.8; max-width: 260px; }

    #start-btn {
      display: none;
      background: #c8832a; color: #0a1a14; border: none; border-radius: 30px;
      padding: 14px 32px; font-size: 16px; font-family: Georgia, serif;
      font-weight: bold; letter-spacing: 1px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,131,42,0.4);
    }
    #start-btn:active { transform: scale(0.97); }

    .dots { display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #c8832a; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-8px);opacity:1} }

    #instructions {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 24px 32px;
      background: linear-gradient(to top, rgba(10,26,20,0.95) 60%, transparent);
      color: #e8c87a; text-align: center; z-index: 100; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #instructions.hidden { opacity: 0; }
    .instruction-icon { font-size: 32px; margin-bottom: 8px; display: block; animation: float 2s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    #instructions p { font-size: 14px; letter-spacing: 1px; color: #b8d4c0; line-height: 1.6; }
    #instructions strong { color: #e8c87a; }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,26,20,0.9) 60%, transparent);
      z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-logo { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid #c8832a; overflow: hidden; object-fit: cover; }
    .brand-name { color: #e8c87a; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .insta-btn {
      display: flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: white; text-decoration: none; border-radius: 20px;
      padding: 7px 14px; font-size: 12px; font-family: Georgia, serif; letter-spacing: 0.5px; font-weight: bold;
    }

    #ar-wrapper { position: fixed; inset: 0; z-index: 1; }
    a-scene { width: 100%; height: 100%; }

    #found-badge {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
      background: rgba(200,131,42,0.15); border: 1px solid #c8832a; border-radius: 12px;
      padding: 12px 24px; color: #e8c87a; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; z-index: 200; pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0;
    }
    #found-badge.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }

    #error-msg {
      display: none; position: fixed; bottom: 100px; left: 20px; right: 20px;
      background: rgba(200,50,50,0.9); color: white; padding: 12px 16px;
      border-radius: 10px; font-size: 13px; text-align: center; z-index: 300;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="logo-wrapper">
      <img src="assets/logo.png" alt="André & Thiago" />
    </div>
    <div class="loading-title">André & Thiago</div>
    <p class="loading-sub" id="loading-msg">Ativando a câmera para a<br>experiência em realidade aumentada…</p>
    <div class="dots" id="loading-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <button id="start-btn" onclick="startAR()">📸 Ativar Câmera</button>
  </div>

  <div id="topbar">
    <div class="brand">
      <img class="brand-logo" src="assets/logo.png" alt="André & Thiago" />
      <span class="brand-name">André & Thiago</span>
    </div>
    <a class="insta-btn" href="https://www.instagram.com/andreethiago19" target="_blank">♪ Seguir</a>
  </div>

  <div id="instructions">
    <span class="instruction-icon">📸</span>
    <p>Aponte a câmera para o <strong>cartão de visita</strong><br>e veja a mágica acontecer</p>
  </div>

  <div id="found-badge">🎸 Tocando ao vivo!</div>
  <div id="error-msg" id="error-msg"></div>

  <div id="ar-wrapper">
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video id="ar-video" src="assets/video.mp4" preload="auto" loop playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" position="0 0 0.01" width="1" height="0.552"></a-video>
        <a-plane position="0 0 0.005" width="1.06" height="0.61" color="#c8832a" opacity="0.25" material="shader: flat"></a-plane>
      </a-entity>
    </a-scene>
  </div>

  <script>
    const loadingScreen = document.getElementById('loading-screen');
    const instructions  = document.getElementById('instructions');
    const foundBadge    = document.getElementById('found-badge');
    const arVideo       = document.getElementById('ar-video');
    const startBtn      = document.getElementById('start-btn');
    const loadingMsg    = document.getElementById('loading-msg');
    const loadingDots   = document.getElementById('loading-dots');

    // Mostra botão manual após 4s se câmera não abrir sozinha
    let cameraOpened = false;
    setTimeout(() => {
      if (!cameraOpened) {
        loadingMsg.innerHTML = 'Toque no botão para<br>ativar a câmera';
        loadingDots.style.display = 'none';
        startBtn.style.display = 'block';
      }
    }, 4000);

    function startAR() {
      startBtn.style.display = 'none';
      loadingDots.style.display = 'flex';
      loadingMsg.innerHTML = 'Ativando câmera…';

      // Pede permissão explicitamente
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          stream.getTracks().forEach(t => t.stop());
          cameraOpened = true;
          // Reinicia a cena AR
          const scene = document.querySelector('a-scene');
          if (scene && scene.components['mindar-image']) {
            scene.components['mindar-image'].start();
          }
        })
        .catch(err => {
          loadingMsg.innerHTML = 'Permissão de câmera negada.<br>Libere nas configurações do Chrome.';
          loadingDots.style.display = 'none';
        });
    }

    document.querySelector('a-scene').addEventListener('arReady', () => {
      cameraOpened = true;
      loadingScreen.classList.add('hidden');
      setTimeout(() => loadingScreen.style.display = 'none', 700);
    });

    // Fallback de 15s
    setTimeout(() => {
      if (!cameraOpened) {
        loadingScreen.classList.add('hidden');
        setTimeout(() => loadingScreen.style.display = 'none', 700);
      }
    }, 15000);

    document.querySelector('[mindar-image-target]').addEventListener('targetFound', () => {
      arVideo.play().catch(() => {});
      instructions.classList.add('hidden');
      foundBadge.classList.add('show');
      setTimeout(() => foundBadge.classList.remove('show'), 2500);
    });

    document.querySelector('[mindar-image-target]').addEventListener('targetLost', () => {
      arVideo.pause();
      instructions.classList.remove('hidden');
    });
  </script>
</body>
</html>
